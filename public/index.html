<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doughboys</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 0;
    }

    header h1 {
      font-size: 2.5rem;
      color: #f5a623;
      margin-bottom: 10px;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    header p {
      color: #888;
      font-size: 1.1rem;
    }

    /* Episode List View */
    #listView {
      display: block;
    }

    #episodeView {
      display: none;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: #f5a623;
    }

    .search-box input::placeholder {
      color: #666;
    }

    .episode-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .episode-item {
      background: #16213e;
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .episode-item:hover {
      background: #1e2a4a;
      transform: translateX(4px);
    }

    .episode-number {
      background: #f5a623;
      color: #1a1a2e;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 6px;
      min-width: 50px;
      text-align: center;
    }

    .episode-number.bonus {
      background: #0f3460;
      color: #f5a623;
    }

    .episode-content {
      flex: 1;
      min-width: 0;
    }

    .episode-item-title {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .episode-item-meta {
      font-size: 0.85rem;
      color: #888;
    }

    .episode-restaurants {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .restaurant-tag {
      background: #0f3460;
      color: #f5a623;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* Episode Detail View */
    .back-btn {
      background: none;
      border: none;
      color: #f5a623;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 0;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .episode-header {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .episode-header .episode-number {
      display: inline-block;
      margin-bottom: 12px;
    }

    .episode-title {
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .episode-date {
      color: #888;
      margin-bottom: 16px;
    }

    .episode-description {
      color: #aaa;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .episode-description a {
      color: #f5a623;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
    }

    .card h2 {
      color: #f5a623;
      margin-bottom: 15px;
      font-size: 1.3rem;
    }

    #map {
      height: 350px;
      border-radius: 8px;
      background: #0f0f1a;
    }

    .restaurant-info {
      display: none;
    }

    .restaurant-info.visible {
      display: block;
    }

    .restaurant-name {
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 10px;
    }

    .restaurant-meta {
      color: #888;
      margin-bottom: 15px;
    }

    .location-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .location-item {
      background: #0f3460;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .location-item:first-child {
      border: 1px solid #f5a623;
    }

    .location-address {
      flex: 1;
      font-size: 0.9rem;
      color: #ccc;
      line-height: 1.4;
    }

    .location-distance {
      background: #1a1a2e;
      color: #f5a623;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .distance-badge {
      display: inline-block;
      background: #f5a623;
      color: #1a1a2e;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .no-restaurant {
      color: #888;
      text-align: center;
      padding: 40px 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #f5a623;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .location-status {
      background: #0f3460;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .location-status.success {
      color: #4ade80;
    }

    .location-status.warning {
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="#" id="homeLink">Doughboys</a></h1>
      <p>Browse episodes and find restaurants near you</p>
    </header>

    <!-- Episode List View -->
    <div id="listView">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search episodes or restaurants...">
      </div>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading episodes...</p>
      </div>
      <div id="episodeList" class="episode-list"></div>
    </div>

    <!-- Episode Detail View -->
    <div id="episodeView">
      <button type="button" class="back-btn" id="backBtn">
        <span>←</span> Back to episodes
      </button>

      <div class="episode-header">
        <span class="episode-number" id="detailEpisodeNumber"></span>
        <h2 class="episode-title" id="detailTitle"></h2>
        <p class="episode-date" id="detailDate"></p>
        <div class="episode-description" id="detailDescription"></div>
      </div>

      <div class="main-content">
        <div class="card">
          <h2>Closest Location</h2>
          <div id="locationStatus" class="location-status" style="display: none;"></div>
          <div id="restaurantLoading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Finding closest location...</p>
          </div>
          <div id="restaurantInfo" class="restaurant-info">
            <span class="distance-badge" id="distance"></span>
            <h3 class="restaurant-name" id="restaurantName"></h3>
            <p class="restaurant-meta" id="restaurantMeta"></p>
          </div>
          <div id="noRestaurant" class="no-restaurant" style="display: none;">
            <p>No restaurant location available for this episode</p>
          </div>
        </div>

        <div class="card">
          <h2>Map</h2>
          <div id="map"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Mock restaurant locations (since API doesn't have coords)
    const restaurantLocations = {
      "Ggiata Delicatessen": { lat: 34.0407, lng: -118.2468, address: "Los Angeles, CA" },
      "In-N-Out Burger": { lat: 34.0522, lng: -118.2437, address: "Los Angeles, CA" },
      "Shake Shack": { lat: 34.0195, lng: -118.4912, address: "Los Angeles, CA" },
      "Taco Bell": { lat: 34.0689, lng: -118.0056, address: "Los Angeles, CA" },
      "McDonald's": { lat: 34.0736, lng: -118.4004, address: "Los Angeles, CA" },
      "Wendy's": { lat: 34.1478, lng: -118.1445, address: "Pasadena, CA" },
      "Arby's": { lat: 33.9425, lng: -118.4081, address: "El Segundo, CA" },
      "Del Taco": { lat: 34.1808, lng: -118.3090, address: "Burbank, CA" },
      "Carl's Jr.": { lat: 33.8358, lng: -118.3406, address: "Torrance, CA" },
      "Jack in the Box": { lat: 34.0259, lng: -118.2965, address: "Los Angeles, CA" },
      "Edible Arrangements": { lat: 34.0525, lng: -118.2551, address: "Los Angeles, CA" },
      "Chili's": { lat: 34.0580, lng: -118.4165, address: "Los Angeles, CA" },
      "Applebee's": { lat: 34.1561, lng: -118.2536, address: "Glendale, CA" },
      "Olive Garden": { lat: 34.1865, lng: -118.3080, address: "Burbank, CA" },
      "Cheesecake Factory": { lat: 34.0592, lng: -118.4174, address: "Beverly Hills, CA" },
      "Buffalo Wild Wings": { lat: 34.0211, lng: -118.3965, address: "Culver City, CA" },
      "Wingstop": { lat: 34.0634, lng: -118.3076, address: "Los Angeles, CA" },
      "Popeyes": { lat: 34.0485, lng: -118.2545, address: "Los Angeles, CA" },
      "Chick-fil-A": { lat: 34.0623, lng: -118.3541, address: "Los Angeles, CA" },
      "Five Guys": { lat: 34.0731, lng: -118.3794, address: "West Hollywood, CA" },
      "Panda Express": { lat: 34.0456, lng: -118.2672, address: "Los Angeles, CA" },
      "Chipotle": { lat: 34.0589, lng: -118.4452, address: "Santa Monica, CA" },
      "Subway": { lat: 34.0498, lng: -118.2590, address: "Los Angeles, CA" },
      "Domino's": { lat: 34.0695, lng: -118.2912, address: "Los Angeles, CA" },
      "Pizza Hut": { lat: 34.0823, lng: -118.3215, address: "Los Angeles, CA" },
      "Papa John's": { lat: 34.0912, lng: -118.2845, address: "Los Angeles, CA" },
      "KFC": { lat: 34.0567, lng: -118.2732, address: "Los Angeles, CA" },
      "Sonic": { lat: 34.1234, lng: -118.2156, address: "Pasadena, CA" },
      "Dairy Queen": { lat: 34.1456, lng: -118.1523, address: "Pasadena, CA" },
      "Baskin-Robbins": { lat: 34.0345, lng: -118.4523, address: "Santa Monica, CA" },
      "Dunkin'": { lat: 34.0678, lng: -118.3512, address: "Los Angeles, CA" },
      "Starbucks": { lat: 34.0512, lng: -118.2478, address: "Los Angeles, CA" },
      "Jamba Juice": { lat: 34.0398, lng: -118.4678, address: "Santa Monica, CA" },
    };

    // Default fallback location (LA area)
    const defaultLocation = { lat: 34.0522, lng: -118.2437 };

    let map = null;
    let episodes = [];
    let userLocation = null;

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Calculate distance between two points (Haversine formula)
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 3959; // Earth's radius in miles
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Get user location
    async function getUserLocation() {
      return new Promise((resolve) => {
        if (!('geolocation' in navigator)) {
          resolve({ location: defaultLocation, isDefault: true });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve({
              location: { lat: position.coords.latitude, lng: position.coords.longitude },
              isDefault: false
            });
          },
          () => {
            resolve({ location: defaultLocation, isDefault: true });
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    // Initialize map
    function initMap(center) {
      if (map) {
        map.remove();
      }
      map = L.map('map').setView([center.lat, center.lng], 12);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        maxZoom: 19
      }).addTo(map);
    }

    // Find closest restaurant for an episode using the /api/nearby endpoint
    async function findClosestForEpisode(episode, userLat, userLng) {
      if (!episode.restaurants || episode.restaurants.length === 0) {
        return null;
      }

      try {
        const response = await fetch(`/api/nearby?lat=${userLat}&lng=${userLng}&restaurants=${encodeURIComponent(episode.restaurants.join(','))}`, {
          headers: { 'Cache-Control': 'max-age=10800' }
        });
        const data = await response.json();

        if (Array.isArray(data) && data.length > 0) {
          const locations = data.map((place) => {
            const lat = place.location.latitude;
            const lng = place.location.longitude;
            const distance = getDistance(userLat, userLng, lat, lng);

            return {
              name: place.displayName?.text || episode.restaurants[0],
              lat,
              lng,
              address: place.formattedAddress,
              distance
            };
          });

          // Sort by distance and return all locations
          locations.sort((a, b) => a.distance - b.distance);
          return locations;
        }
      } catch (err) {
        console.error('Error fetching nearby restaurants:', err);
      }

      // Fallback to local mock data if API fails
      let closest = null;
      let closestDistance = Infinity;

      for (const restaurantName of episode.restaurants) {
        const location = restaurantLocations[restaurantName];
        if (!location) continue;

        const distance = getDistance(userLat, userLng, location.lat, location.lng);
        if (distance < closestDistance) {
          closestDistance = distance;
          closest = { name: restaurantName, ...location, distance };
        }
      }

      // Return as array for consistency, or null if no locations found
      return closest ? [closest] : null;
    }

    // Render episode list
    function renderEpisodeList(episodesToRender) {
      const container = document.getElementById('episodeList');
      container.innerHTML = '';

      for (const episode of episodesToRender) {
        const item = document.createElement('div');
        item.className = 'episode-item';
        item.dataset.number = episode.number;

        const restaurantTags = (episode.restaurants || [])
          .slice(0, 3)
          .map(r => `<span class="restaurant-tag">${r}</span>`)
          .join('');

        item.innerHTML = `
          <span class="episode-number ${episode.type.toLowerCase() === 'bonus' ? 'bonus' : episode.number == null ? 'bonus' : ''}">${episode.number || 'Bonus'}</span>
          <div class="episode-content">
            <div class="episode-item-title">${episode.title}</div>
            <div class="episode-item-meta">${formatDate(episode.pubDate)}</div>
          </div>
          <div class="episode-restaurants">${restaurantTags}</div>
        `;

        item.addEventListener('click', () => showEpisode(episode));
        container.appendChild(item);
      }
    }

    // Show episode detail view
    async function showEpisode(episode) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('episodeView').style.display = 'block';

      // Update episode info
      document.getElementById('detailEpisodeNumber').textContent = episode.number ? `#${episode.number}` : 'Bonus';
      document.getElementById('detailEpisodeNumber').className = `episode-number ${episode.type === 'bonus' ? 'bonus' : ''}`;
      document.getElementById('detailTitle').textContent = episode.title;
      document.getElementById('detailDate').textContent = formatDate(episode.pubDate);
      document.getElementById('detailDescription').innerHTML = episode.description;

      // Reset restaurant info
      document.getElementById('restaurantInfo').classList.remove('visible');
      document.getElementById('noRestaurant').style.display = 'none';
      document.getElementById('restaurantLoading').style.display = 'block';
      document.getElementById('locationStatus').style.display = 'none';

      // Get user location if we don't have it
      if (!userLocation) {
        const result = await getUserLocation();
        userLocation = result.location;

        const statusEl = document.getElementById('locationStatus');
        statusEl.style.display = 'flex';
        if (result.isDefault) {
          statusEl.className = 'location-status warning';
          statusEl.innerHTML = '⚠️ Using default Los Angeles location';
        } else {
          statusEl.className = 'location-status success';
          statusEl.innerHTML = '📍 Using your location';
        }
      } else {
        document.getElementById('locationStatus').style.display = 'flex';
      }

      // Initialize map
      initMap(userLocation);

      // Find closest restaurant
      const restaurants = await findClosestForEpisode(episode, userLocation.lat, userLocation.lng);

      document.getElementById('restaurantLoading').style.display = 'none';

      if (!restaurants || restaurants.length === 0) {
        document.getElementById('noRestaurant').style.display = 'block';
        return;
      }

      // Show restaurant info for the closest one
      const closest = restaurants[0];
      document.getElementById('restaurantInfo').classList.add('visible');
      document.getElementById('distance').textContent = `${closest.distance.toFixed(1)} miles away`;
      document.getElementById('restaurantName').textContent = closest.name;
      
      // Show all addresses as styled list
      const addressList = restaurants.map((r) => `
        <div class="location-item">
          <span class="location-address">${r.address || 'Location approximate'}</span>
          <span class="location-distance">${r.distance.toFixed(1)} mi</span>
        </div>
      `).join('');
      document.getElementById('restaurantMeta').innerHTML = `<div class="location-list">${addressList}</div>`;

      // Add markers
      const userIcon = L.divIcon({
        className: 'user-marker',
        html: '<div style="background:#4285f4;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });

      const restaurantIcon = L.divIcon({
        className: 'restaurant-marker',
        html: '<div style="background:#f5a623;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;">🍔</div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });

      L.marker([userLocation.lat, userLocation.lng], { icon: userIcon })
        .addTo(map)
        .bindPopup('You are here');

      // Add markers for all restaurant locations
      const allCoords = [[userLocation.lat, userLocation.lng]];
      restaurants.forEach((restaurant, index) => {
        const marker = L.marker([restaurant.lat, restaurant.lng], { icon: restaurantIcon })
          .addTo(map)
          .bindPopup(`<strong>${restaurant.name}</strong><br>${restaurant.address || ''}<br><em>${restaurant.distance.toFixed(1)} miles</em>`);
        
        // Open popup for the closest one
        if (index === 0) {
          marker.openPopup();
        }

        allCoords.push([restaurant.lat, restaurant.lng]);

        // Draw line to each restaurant
        L.polyline([[userLocation.lat, userLocation.lng], [restaurant.lat, restaurant.lng]], {
          color: index === 0 ? '#f5a623' : '#888',
          weight: index === 0 ? 2 : 1,
          dashArray: '5, 10'
        }).addTo(map);
      });

      // Fit bounds to include all markers
      const bounds = L.latLngBounds(allCoords);
      map.fitBounds(bounds, { padding: [50, 50] });
    }

    // Show list view
    function showListView() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('episodeView').style.display = 'none';
      if (map) {
        map.remove();
        map = null;
      }
    }

    // Search/filter episodes
    function filterEpisodes(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderEpisodeList(episodes);
        return;
      }

      const filtered = episodes.filter(ep => {
        const titleMatch = ep.title.toLowerCase().includes(q);
        const restaurantMatch = (ep.restaurants || []).some(r => r.toLowerCase().includes(q));
        return titleMatch || restaurantMatch;
      });

      renderEpisodeList(filtered);
    }

    // Fetch episodes from API
    async function fetchEpisodes() {
      try {
        const response = await fetch('/api/episodes');
        episodes = await response.json();
        document.getElementById('loading').style.display = 'none';
        renderEpisodeList(episodes);
      } catch (error) {
        console.error('Failed to fetch episodes:', error);
        document.getElementById('loading').innerHTML = '<p style="color: #f87171;">Failed to load episodes</p>';
      }
    }

    // Event listeners
    document.getElementById('backBtn').addEventListener('click', showListView);
    document.getElementById('homeLink').addEventListener('click', (e) => {
      e.preventDefault();
      showListView();
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterEpisodes(e.target.value);
    });

    // Initialize
    fetchEpisodes();
  </script>
</body>
</html>
